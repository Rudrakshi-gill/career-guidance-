<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerGuide AI - Your Career Advisor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-rocket"></i> CareerGuide AI</h1>
            <p>Your Personal Career Advisor</p>
        </header>

        <div class="chat-container">
            <div id="chatBox" class="chat-box">
                <div class="welcome-message">
                    <div class="bot-message">
                        <i class="fas fa-robot"></i>
                        <span>Hello! I'm CareerGuide AI 🤖<br>
                        Ask me about career paths, skills, salaries, job trends, or resume tips!</span>
                    </div>
                </div>
            </div>
            
            <div class="chat-input-container">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Type your career question here..." autocomplete="off">
                    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
                <div class="quick-questions">
                    <button class="quick-btn" data-question="What career suits my skills?">What career suits my skills?</button>
                    <button class="quick-btn" data-question="How to prepare for tech interviews?">Tech interview prep</button>
                    <button class="quick-btn" data-question="Best paying jobs 2024">Best paying jobs 2024</button>
                </div>
            </div>
        </div>

        <div class="features">
            <div class="feature-card">
                <i class="fas fa-graduation-cap"></i>
                <span>Career Matching</span>
            </div>
            <div class="feature-card">
                <i class="fas fa-chart-line"></i>
                <span>Salary Data</span>
            </div>
            <div class="feature-card">
                <i class="fas fa-tools"></i>
                <span>Skill Assessment</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
